locale: "en-US"

metadata:
  name: "SampleApp"
  subtitle: "Organize tasks locally"
  promotional_text: "A simple utility app designed to help you organize daily tasks locally on your device."
  description: |
    SampleApp is a simple utility app designed to help users organize their daily tasks locally on device.

    Key Features:
    - Create and manage simple task lists
    - Keep daily notes organized
    - Use a clean and focused interface
    - Designed for local, private use

    Privacy:
    SampleApp is designed to store app content locally on your device. The app does not upload your task data to a backend server for advertising, tracking, or model training.

    Terms of Use:
    https://www.apple.com/legal/internet-services/itunes/dev/stdeula/
  keywords: "task list,daily planner,notes,organizer,local tasks,productivity"
  whats_new: |
    Initial release.

